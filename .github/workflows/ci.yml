name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: jdx/mise-action@v4
        with:
          experimental: true
          install: false

      - name: Install mise tools
        run: |
          for attempt in 1 2 3; do
            mise install --yes && break
            echo "Attempt $attempt failed, retrying in 10s..."
            sleep 10
          done

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci

      - name: Install actionlint
        run: |
          bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          echo "${PWD}" >> "$GITHUB_PATH"

      - name: Check version references in sync with Cargo.toml
        run: make check-versions

      - name: Check rule-count docs in sync with registry
        run: make check-rule-docs

      - name: Run linting
        run: make lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: jdx/mise-action@v4
        with:
          experimental: true
          install: false

      - name: Install mise tools
        run: |
          for attempt in 1 2 3; do
            mise install --yes && break
            echo "Attempt $attempt failed, retrying in 10s..."
            sleep 10
          done

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci

      - name: Run tests
        run: make test-ci

  # Canary: run the test suite on Windows to surface platform-divergent behavior.
  # Intentionally NOT part of `all-checks-passed` (non-blocking) while we learn
  # what, if anything, fails on Windows. Runs on pushes to main and manual
  # dispatch, not on every PR, to limit Windows runner minutes. Promote to a
  # required check (add to all-checks-passed needs) once it is reliably green.
  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    if: github.event_name != 'pull_request'
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: jdx/mise-action@v4
        with:
          experimental: true
          install: false

      - name: Install mise tools
        run: |
          for attempt in 1 2 3; do
            mise install --yes && break
            echo "Attempt $attempt failed, retrying in 10s..."
            sleep 10
          done

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-windows

      - name: Install make
        run: choco install make --no-progress -y

      - name: Run tests
        # Run inside the mise environment so the cargo-nextest shim is on PATH
        # for cargo (mise-action's global activation does not reach the make
        # child shell on Windows the way it does on Linux). Use the no-fail-fast
        # target so one canary run enumerates every Windows failure.
        run: mise exec -- make test-ci-no-fail-fast

  docs-check:
    name: Docs fmt-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: jdx/mise-action@v4
        with:
          experimental: true
          install: false

      - name: Install mise tools
        run: |
          for attempt in 1 2 3; do
            mise install --yes && break
            echo "Attempt $attempt failed, retrying in 10s..."
            sleep 10
          done

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci

      - name: Assert docs/ is fmt-clean
        run: make docs-check

  all-checks-passed:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [lint, test, docs-check]
    if: always()
    steps:
      - name: Verify all checks passed
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]; then
            echo "❌ Some checks failed or were cancelled"
            exit 1
          fi
          echo "✅ All checks passed!"
