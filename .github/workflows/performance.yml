name: Performance Tests

on:
  # Run weekly on Sunday at 2 AM UTC
  schedule:
    - cron: '0 2 * * 0'

  # Allow manual triggering
  workflow_dispatch:
    inputs:
      verbose:
        description: 'Run with verbose output'
        required: false
        default: 'false'
        type: boolean

  # Gate complexity regressions on every PR
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  complexity-gate:
    name: Complexity Regression Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: jdx/mise-action@v4
        with:
          experimental: true
          install: false

      - name: Install mise tools
        run: |
          for attempt in 1 2 3; do
            mise install --yes && break
            echo "Attempt $attempt failed, retrying in 10s..."
            sleep 10
          done

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci

      - name: Run linear complexity regression tests
        run: make test-complexity
        env:
          RUST_BACKTRACE: 1

  performance:
    name: Run Performance Tests
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: jdx/mise-action@v4
        with:
          experimental: true
          install: false

      - name: Install mise tools
        run: |
          for attempt in 1 2 3; do
            mise install --yes && break
            echo "Attempt $attempt failed, retrying in 10s..."
            sleep 10
          done

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci

      - name: Run performance tests
        run: make test-performance
        env:
          RUST_BACKTRACE: 1
          RUST_LOG: ${{ inputs.verbose == 'true' && 'debug' || 'warn' }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: performance-test-results
          path: |
            target/nextest/default/*.xml
            target/nextest/performance/*.xml
          retention-days: 30
