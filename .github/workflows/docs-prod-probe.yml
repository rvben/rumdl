name: Docs prod probe

on:
  schedule:
    # Every 30 minutes. Catches regressions that made it past the pre-deploy
    # smoke test (e.g. Cloudflare Pages rollback, stale edge cache, DNS drift).
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Fetch live landing page
        run: |
          mkdir -p site
          curl --fail --silent --show-error --location \
            --max-time 30 \
            --retry 2 \
            --output site/index.html \
            https://rumdl.dev/

      - name: Run structural smoke test
        run: make docs-smoke

      - name: Open issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          existing=$(gh issue list --state open \
            --search 'in:title "rumdl.dev monitoring: landing page regression"' \
            --json number --jq 'length')
          if [ "$existing" = "0" ]; then
            gh issue create \
              --title "rumdl.dev monitoring: landing page regression detected" \
              --body "Scheduled probe of https://rumdl.dev/ failed the structural smoke test.

          Run: $RUN_URL

          Likely causes:
          - Landing page lost its \`<div class=\"grid cards\">\` container
          - Grid-card continuation prose re-fenced as \`<code class=\"language-text\">\` (see #583)
          - Stale Cloudflare Pages edge cache serving an older build

          To investigate: run \`make docs-smoke\` locally against the built site, or compare \`curl https://rumdl.dev/ > local.html\` against a known-good deploy."
          else
            echo "Monitoring issue already open (#$(gh issue list --state open --search 'in:title \"rumdl.dev monitoring: landing page regression\"' --json number --jq '.[0].number')); skipping duplicate alert"
          fi
