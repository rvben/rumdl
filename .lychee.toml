# Lychee link checker configuration
# https://lychee.cli.rs/configuration/

# Paths to exclude from checking
exclude_path = [
    "test_tmp",
    "benchmark",
    "__tests__",
    "CHANGELOG.md",
    "docs/superpowers",
    "docs/design",
    ".claude",
]

# Don't check mail addresses
include_mail = false

# Accept 429 (rate limiting) as valid
accept = [200, 429]

# Exclude URLs from checking (regex). npmjs.com returns 403 to automated link
# checkers due to bot protection; the package page is valid and is linked from
# the stability docs alongside crates.io and PyPI.
exclude = ['^https://www\.npmjs\.com/']

# Timeout per request in seconds
timeout = 30

# Maximum number of concurrent requests
max_concurrency = 16
